<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">MyShop</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to MyShop</h1>
        <p>Best Products at the Best Price</p>
        <button>Shop Now</button>
    </section>

    <!-- Products Section -->
    <section class="products">
        <h2>Our Products</h2>

        <div class="product-container">

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Product 1</h3>
                <p>$20</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Product 2</h3>
                <p>$30</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Product 3</h3>
                <p>$40</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop | All Rights Reserved</p>
    </footer>

</body>
</html>
