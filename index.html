<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProShop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>ProShop</h2>
    <div>
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="openCart()">🛒 (<span id="cart-count">0</span>)</button>
    </div>
</header>

<section class="hero">
    <h1>Premium Collection 2026</h1>
    <p>Upgrade Your Lifestyle</p>
</section>

<section class="products" id="product-container"></section>

<!-- Cart -->
<div class="cart" id="cart">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <h4>Total: $<span id="cart-total">0</span></h4>
    <a href="checkout.html"><button>Checkout</button></a>
    <button onclick="closeCart()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
